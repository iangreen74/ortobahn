name: CI Auto-Fix

on:
  workflow_run:
    workflows: ["CI", "Deploy"]
    types: [completed]
    branches: [main, master]

jobs:
  auto-fix:
    runs-on: self-hosted
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      !startsWith(github.event.workflow_run.head_branch, 'cifix/')
    steps:
      - name: Fix workspace permissions
        run: sudo chown -R $(id -u):$(id -g) "$GITHUB_WORKSPACE" 2>/dev/null || true

      - name: Generate GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 5
          token: ${{ steps.app_token.outputs.token }}

      - name: Circuit breaker — prevent infinite fix loops
        id: loop_check
        run: |
          # If the last commit was a cifix commit, don't try again
          LAST_MSG=$(git log -1 --format=%s)
          if echo "$LAST_MSG" | grep -q "^cifix:"; then
            echo "Last commit was a CI-Fix commit — stopping to prevent loop"
            echo "should_skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          # If 3+ recent commits are cifix, something is stuck
          CIFIX_COUNT=$(git log -5 --format=%s | grep -c "^cifix:" || true)
          if [ "$CIFIX_COUNT" -ge 3 ]; then
            echo "3+ recent cifix commits — self-healing loop detected, stopping"
            echo "should_skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "should_skip=false" >> $GITHUB_OUTPUT

      - name: Detect failure source
        id: detect
        if: steps.loop_check.outputs.should_skip != 'true'
        run: |
          WORKFLOW_NAME="${{ github.event.workflow_run.name }}"
          echo "workflow_name=$WORKFLOW_NAME" >> $GITHUB_OUTPUT
          if [ "$WORKFLOW_NAME" = "Deploy" ]; then
            echo "is_deploy=true" >> $GITHUB_OUTPUT
            echo "Triggered by Deploy failure — will escalate to LLM agent"
          else
            echo "is_deploy=false" >> $GITHUB_OUTPUT
            echo "Triggered by CI failure — will attempt mechanical fix first"
          fi

      # --- Deploy failures: skip mechanical fixes, go straight to LLM ---
      - name: Escalate deploy failure to LLM agent
        if: >
          steps.loop_check.outputs.should_skip != 'true' &&
          steps.detect.outputs.is_deploy == 'true'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          echo "Deploy failure — escalating directly to LLM CI Fix Agent"
          gh workflow run ci-fix-escalation.yml \
            -f run_id="$RUN_ID" \
            -f branch="${{ github.event.workflow_run.head_branch }}" \
            -f workflow_name="Deploy"

      # --- CI failures: try mechanical fix first, then escalate ---
      - name: Install dependencies
        if: >
          steps.loop_check.outputs.should_skip != 'true' &&
          steps.detect.outputs.is_deploy == 'false'
        run: python3.12 -m pip install -e ".[dev,web]"

      - name: Attempt lint/format auto-fix
        id: lint_fix
        if: >
          steps.loop_check.outputs.should_skip != 'true' &&
          steps.detect.outputs.is_deploy == 'false'
        run: |
          ruff check --fix ortobahn/ tests/ || true
          ruff format ortobahn/ tests/
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Validate lint fix
        if: >
          steps.loop_check.outputs.should_skip != 'true' &&
          steps.detect.outputs.is_deploy == 'false' &&
          steps.lint_fix.outputs.changed == 'true'
        run: |
          ruff check ortobahn/ tests/
          ruff format --check ortobahn/ tests/

      - name: Attempt typecheck fix
        if: >
          steps.loop_check.outputs.should_skip != 'true' &&
          steps.detect.outputs.is_deploy == 'false' &&
          steps.lint_fix.outputs.changed == 'false'
        id: mypy_check
        run: |
          set -o pipefail
          if mypy ortobahn/ 2>&1 | tee /tmp/mypy_output.txt; then
            echo "passed=true" >> $GITHUB_OUTPUT
          else
            echo "passed=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure git
        if: >
          steps.loop_check.outputs.should_skip != 'true' &&
          steps.detect.outputs.is_deploy == 'false' &&
          steps.lint_fix.outputs.changed == 'true'
        run: |
          git config user.name "Ortobahn CI Fix"
          git config user.email "cifix@ortobahn.com"

      - name: Create fix PR with auto-merge
        if: >
          steps.loop_check.outputs.should_skip != 'true' &&
          steps.detect.outputs.is_deploy == 'false' &&
          steps.lint_fix.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          BASE_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          BRANCH="cifix/lint-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "cifix: auto-fix lint/format errors

          Automated fix triggered by CI run #${RUN_ID}.
          Applied: ruff check --fix && ruff format

          Co-Authored-By: Ortobahn CI Fix <cifix@ortobahn.com>"
          git push origin "$BRANCH"
          cat > /tmp/pr_body.md << 'EOF'
          ## Automated CI Fix

          This PR applies automatic lint and format fixes via `ruff check --fix && ruff format`.

          **No LLM was used** — these are purely mechanical fixes.

          ---
          Generated by Ortobahn CI Fix Agent
          EOF
          PR_URL=$(gh pr create \
            --title "cifix: auto-fix lint/format errors" \
            --body-file /tmp/pr_body.md \
            --base "$BASE_BRANCH")
          echo "Created PR: $PR_URL"

          # Enable auto-merge so the fix flows without human intervention
          gh pr merge "$PR_URL" --auto --squash || echo "Auto-merge not available (branch protection may require reviews)"

      - name: Escalate CI failure to LLM agent
        if: >
          steps.loop_check.outputs.should_skip != 'true' &&
          steps.detect.outputs.is_deploy == 'false' &&
          steps.lint_fix.outputs.changed == 'false'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          echo "Mechanical fixes insufficient — escalating to LLM CI Fix Agent"
          gh workflow run ci-fix-escalation.yml \
            -f run_id="$RUN_ID" \
            -f branch="${{ github.event.workflow_run.head_branch }}" \
            -f workflow_name="CI"
