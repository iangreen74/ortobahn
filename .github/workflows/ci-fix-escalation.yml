name: CI Fix Escalation (LLM)

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Failed workflow run ID to diagnose"
        required: true
      branch:
        description: "Branch where the failure occurred"
        required: true
        default: "main"
      workflow_name:
        description: "Name of the failed workflow (CI or Deploy)"
        required: false
        default: "CI"

jobs:
  llm-fix:
    runs-on: self-hosted
    # Prevent infinite loops — don't fix branches created by cifix
    if: "!startsWith(github.event.inputs.branch, 'cifix/')"
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - name: Fix workspace permissions
        run: sudo chown -R $(id -u):$(id -g) "$GITHUB_WORKSPACE" 2>/dev/null || true

      - name: Ensure gh CLI is available
        run: |
          if command -v gh &>/dev/null; then
            echo "gh CLI already installed: $(gh --version | head -1)"
          elif command -v dnf &>/dev/null; then
            echo "Installing gh CLI via dnf..."
            sudo dnf install -y 'dnf-command(config-manager)' 2>/dev/null || true
            sudo dnf config-manager --add-repo https://cli.github.com/packages/rpm/gh-cli.repo
            sudo dnf install -y gh
            echo "Installed: $(gh --version | head -1)"
          elif command -v apt-get &>/dev/null; then
            echo "Installing gh CLI via apt..."
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
              | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg 2>/dev/null
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
              | sudo tee /etc/apt/sources.list.d/github-cli-stable.list > /dev/null
            sudo apt-get update -qq && sudo apt-get install -y -qq gh > /dev/null
            echo "Installed: $(gh --version | head -1)"
          else
            echo "ERROR: No supported package manager found" && exit 1
          fi

      - name: Generate GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 5
          token: ${{ steps.app_token.outputs.token }}

      - name: Circuit breaker — prevent infinite fix loops
        id: loop_check
        run: |
          LAST_MSG=$(git log -1 --format=%s)
          if echo "$LAST_MSG" | grep -q "^cifix:"; then
            echo "Last commit was a CI-Fix commit — stopping to prevent loop"
            echo "should_skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          CIFIX_COUNT=$(git log -5 --format=%s | grep -c "^cifix:" || true)
          if [ "$CIFIX_COUNT" -ge 3 ]; then
            echo "3+ recent cifix commits — self-healing loop detected, stopping"
            echo "should_skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "should_skip=false" >> $GITHUB_OUTPUT

      - name: Install dependencies
        if: steps.loop_check.outputs.should_skip != 'true'
        run: python3.12 -m pip install -e ".[dev,web]"

      - name: Configure git
        if: steps.loop_check.outputs.should_skip != 'true'
        run: |
          git config user.name "Ortobahn CI Fix"
          git config user.email "cifix@ortobahn.com"

      - name: Run LLM-powered CI Fix Agent
        if: steps.loop_check.outputs.should_skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          CIFIX_ENABLED: "true"
          CIFIX_AUTO_PR: "true"
          DATABASE_URL: ""
          CIFIX_WORKFLOW_NAME: ${{ inputs.workflow_name }}
        run: |
          echo "Running LLM-powered CI Fix Agent for ${{ inputs.workflow_name }} run #${{ inputs.run_id }}..."
          python3.12 -m ortobahn ci-fix
        timeout-minutes: 10
