<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d0d12">
    <title>{% block title %}Ortobahn{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
</head>
<body class="has-sidebar">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <a href="/my/dashboard">
                <strong class="brand-text">Ortobahn</strong>
            </a>
            <span id="pipeline-pulse"
                  hx-get="/my/api/pipeline-pulse"
                  hx-trigger="load, every 5s"
                  hx-swap="innerHTML"></span>
        </div>

        <div class="sidebar-search">
            <input type="text" id="search-input" placeholder="Ask Ortobahn..."
                   autocomplete="off" spellcheck="false"
                   onfocus="document.getElementById('search-overlay').classList.add('open')"
                   hx-get="/my/search"
                   hx-trigger="keyup changed delay:300ms"
                   hx-target="#search-results"
                   hx-vals='js:{"q": document.getElementById("search-input").value}'
                   name="q">
            <div id="search-overlay" class="search-overlay">
                <div id="search-results" class="search-results"></div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a href="/my/dashboard" class="nav-item {% if request.url.path == '/my/dashboard' %}active{% endif %}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span>Home</span>
            </a>
            <a href="/my/review" class="nav-item {% if request.url.path == '/my/review' %}active{% endif %}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                <span>Review Queue</span>
                <span id="review-badge" class="nav-badge"
                      hx-get="/my/api/review-count"
                      hx-trigger="load, every 15s"
                      hx-swap="innerHTML"></span>
            </a>

            <div class="nav-section">CONTENT</div>
            <a href="/my/posts" class="nav-item {% if request.url.path == '/my/posts' %}active{% endif %}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                <span>Posts</span>
            </a>
            <a href="/my/articles" class="nav-item {% if '/my/articles' in request.url.path %}active{% endif %}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                <span>Articles</span>
            </a>
            <a href="/my/calendar" class="nav-item {% if request.url.path == '/my/calendar' %}active{% endif %}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span>Calendar</span>
            </a>

            <div class="nav-section">INSIGHTS</div>
            <a href="/my/performance" class="nav-item {% if request.url.path in ('/my/performance', '/my/analytics') %}active{% endif %}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                <span>Performance</span>
            </a>
            <a href="/my/activity" class="nav-item {% if request.url.path == '/my/activity' %}active{% endif %}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                <span>Activity</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="/my/settings" class="nav-item {% if '/my/settings' in request.url.path %}active{% endif %}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                <span>Settings</span>
            </a>
            <div class="nav-divider"></div>
            <a href="#" class="nav-item" onclick="fetch('/api/auth/logout',{method:'POST'}).then(()=>location.href='/api/auth/login');return false;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span>Log Out</span>
            </a>
        </div>
    </aside>

    <div class="main-wrapper">
        <!-- Toast notification container -->
        <div id="toast-container" class="toast-container"
             hx-get="/api/toasts"
             hx-trigger="load, every 10s"
             hx-swap="innerHTML">
        </div>

        <!-- Mobile sidebar toggle -->
        <button class="sidebar-toggle" id="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>

        <footer class="main-footer">
            <p><small>Ortobahn &mdash; Autonomous AI Marketing Engine by <a href="https://vaultscaler.com">Vaultscaler</a></small></p>
        </footer>
    </div>

    <script>
    /* Auto-dismiss toasts after 6 seconds */
    document.body.addEventListener('htmx:afterSwap', function(evt) {
        if (evt.detail.target.id === 'toast-container') {
            var toasts = evt.detail.target.querySelectorAll('.toast');
            toasts.forEach(function(toast) {
                setTimeout(function() {
                    toast.classList.add('toast-fade-out');
                    setTimeout(function() { toast.remove(); }, 400);
                }, 6000);
            });
        }
    });
    /* Allow manual toast dismissal */
    document.body.addEventListener('click', function(evt) {
        if (evt.target.classList.contains('toast-close')) {
            var toast = evt.target.closest('.toast');
            if (toast) {
                toast.classList.add('toast-fade-out');
                setTimeout(function() { toast.remove(); }, 400);
            }
        }
    });
    /* Convert <time datetime="..."> elements to local timezone */
    function _localizeTimestamps(root) {
        (root || document).querySelectorAll('time[datetime]').forEach(function(el) {
            var d = new Date(el.getAttribute('datetime'));
            if (!isNaN(d)) {
                el.textContent = d.toLocaleString(undefined, {month:'short', day:'numeric', hour:'numeric', minute:'2-digit'});
            }
        });
    }
    _localizeTimestamps();
    document.body.addEventListener('htmx:afterSwap', function(evt) {
        _localizeTimestamps(evt.detail.target);
    });
    /* Close search overlay on escape or click-outside */
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            document.getElementById('search-overlay').classList.remove('open');
            document.getElementById('search-input').blur();
        }
    });
    document.addEventListener('click', function(e) {
        var overlay = document.getElementById('search-overlay');
        var search = document.querySelector('.sidebar-search');
        if (overlay && search && !search.contains(e.target)) {
            overlay.classList.remove('open');
        }
    });
    /* Close mobile sidebar on outside click */
    document.addEventListener('click', function(e) {
        var sidebar = document.getElementById('sidebar');
        var toggle = document.getElementById('sidebar-toggle');
        if (sidebar.classList.contains('open') && !sidebar.contains(e.target) && !toggle.contains(e.target)) {
            sidebar.classList.remove('open');
        }
    });
    </script>
</body>
</html>
