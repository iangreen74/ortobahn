<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started - Ortobahn</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            max-width: 560px;
            width: 100%;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px 32px;
        }
        .header h1 { font-size: 22px; margin-bottom: 4px; }
        .header p { opacity: 0.85; font-size: 14px; }
        .progress {
            display: flex;
            gap: 6px;
            margin-top: 12px;
        }
        .progress-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transition: background 0.3s;
        }
        .progress-dot.active { background: white; }
        .chat-area {
            padding: 24px 32px;
            min-height: 300px;
            max-height: 420px;
            overflow-y: auto;
        }
        .msg { margin-bottom: 16px; animation: fadeIn 0.3s ease; }
        .msg-ai {
            background: #f0f4ff;
            border-radius: 12px 12px 12px 2px;
            padding: 12px 16px;
            max-width: 85%;
            font-size: 14px;
            line-height: 1.6;
            color: #333;
        }
        .msg-user {
            background: #667eea;
            color: white;
            border-radius: 12px 12px 2px 12px;
            padding: 12px 16px;
            max-width: 85%;
            margin-left: auto;
            font-size: 14px;
            line-height: 1.6;
        }
        .msg-label {
            font-size: 11px;
            opacity: 0.5;
            margin-bottom: 4px;
        }
        .input-area {
            padding: 16px 32px 24px;
            border-top: 1px solid #eee;
        }
        .input-area form { display: flex; gap: 8px; }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }
        .input-area input:focus { border-color: #667eea; }
        .input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .input-area button:hover { opacity: 0.9; }
        .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline; }
        .typing { opacity: 0.5; font-style: italic; font-size: 13px; padding: 8px 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .login-link { text-align: center; padding: 0 32px 20px; font-size: 13px; color: #666; }
        .login-link a { color: #667eea; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Let's set up your AI marketing</h1>
            <p>A quick chat to understand your brand</p>
            <div class="progress" id="progress">
                <div class="progress-dot active"></div>
                <div class="progress-dot"></div>
                <div class="progress-dot"></div>
                <div class="progress-dot"></div>
                <div class="progress-dot"></div>
            </div>
        </div>
        <div class="chat-area" id="chat-area"
             hx-get="/onboard/interview/start"
             hx-trigger="load"
             hx-swap="innerHTML">
            <div class="typing">Starting interview...</div>
        </div>
        <div class="input-area">
            <form hx-post="/onboard/interview/step"
                  hx-target="#chat-area"
                  hx-swap="innerHTML"
                  hx-on::after-request="this.reset(); scrollChat();">
                <input type="text" name="answer" placeholder="Type your answer..." autocomplete="off" required>
                <button type="submit">Send <span class="htmx-indicator">...</span></button>
            </form>
        </div>
        <div class="login-link">
            Already have an account? <a href="/api/auth/login">Sign in</a>
        </div>
    </div>
    <script>
        function scrollChat() {
            var el = document.getElementById('chat-area');
            el.scrollTop = el.scrollHeight;
            // Update progress dots
            var dots = document.querySelectorAll('.progress-dot');
            var stepEl = document.querySelector('[data-step]');
            if (stepEl) {
                var step = parseInt(stepEl.dataset.step);
                dots.forEach(function(d, i) { d.classList.toggle('active', i < step); });
            }
        }
        // Auto-scroll on load
        document.body.addEventListener('htmx:afterSettle', scrollChat);
    </script>
</body>
</html>
