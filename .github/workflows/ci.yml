name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: self-hosted
    container: python:3.12-slim
    steps:
      - uses: actions/checkout@v4
      - run: pip install -e ".[dev]"
      - run: ruff check ortobahn/ tests/
      - run: ruff format --check ortobahn/ tests/

  typecheck:
    runs-on: self-hosted
    container: python:3.12-slim
    steps:
      - uses: actions/checkout@v4
      - run: pip install -e ".[dev,web]"
      - run: mypy ortobahn/

  security:
    runs-on: self-hosted
    container: python:3.12-slim
    steps:
      - uses: actions/checkout@v4
      - run: pip install --upgrade pip
      - run: pip install pip-audit
      - run: pip install "."
      - name: Audit dependencies for vulnerabilities
        run: pip-audit --desc

  test:
    runs-on: self-hosted
    needs: [lint, typecheck]
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    container: python:${{ matrix.python-version }}-slim
    steps:
      - uses: actions/checkout@v4
      - run: pip install -e ".[dev,web]"
      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: pytest --cov=ortobahn --cov-report=xml -v
      - name: Run tests
        if: matrix.python-version != '3.12'
        run: pytest -v
      - name: Install git for Codecov
        if: matrix.python-version == '3.12'
        run: apt-get update -qq && apt-get install -y -qq git > /dev/null
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  validate-landing:
    runs-on: self-hosted
    container: python:3.12-slim
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - run: pip install -e ".[dev]"
      - name: Validate landing page links
        run: pytest tests/test_landing_links.py -v -m network

  notify-failure:
    runs-on: self-hosted
    needs: [lint, typecheck, security, test, validate-landing]
    if: failure()
    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set, skipping notification"
            exit 0
          fi
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \":x: CI failed on branch \`${{ github.ref_name }}\` — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>\"}" \
            || true

  deploy-landing:
    runs-on: self-hosted
    needs: [test, validate-landing]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Fix workspace permissions
        run: sudo chown -R $(id -u):$(id -g) "$GITHUB_WORKSPACE" 2>/dev/null || true
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
      - name: Deploy landing page
        run: |
          aws s3 sync ortobahn/landing/ s3://ortobahn-landing/ --delete
          aws cloudfront create-invalidation --distribution-id ${{ vars.CF_DIST_ID }} --paths "/*" > /dev/null
          echo "Landing page deployed to ortobahn.com."
