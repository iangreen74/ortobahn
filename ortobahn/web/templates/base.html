<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d0d12">
    <title>{% block title %}Ortobahn{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="container">
        <ul>
            <li class="brand"><strong><a href="{% block nav_home %}/{% endblock %}">Ortobahn</a></strong></li>
        </ul>
        <ul>
            {% block nav_links %}
            <li><a href="/">Dashboard</a></li>
            <li><a href="/clients/">Clients</a></li>
            <li><a href="/content/">Content</a></li>
            <li><a href="/pipeline/">Pipeline</a></li>
            <li><a href="/sre/">System Health</a></li>
            {% endblock %}
        </ul>
    </nav>

    <!-- Toast notification container -->
    <div id="toast-container" class="toast-container"
         hx-get="/api/toasts"
         hx-trigger="load, every 10s"
         hx-swap="innerHTML">
    </div>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="container">
        <p><small>Ortobahn &mdash; Autonomous AI Marketing Engine by <a href="https://vaultscaler.com">Vaultscaler</a> &middot; <a href="/glass">See how it works &rarr;</a></small></p>
    </footer>

    <script>
    /* Auto-dismiss toasts after 6 seconds */
    document.body.addEventListener('htmx:afterSwap', function(evt) {
        if (evt.detail.target.id === 'toast-container') {
            var toasts = evt.detail.target.querySelectorAll('.toast');
            toasts.forEach(function(toast) {
                setTimeout(function() {
                    toast.classList.add('toast-fade-out');
                    setTimeout(function() { toast.remove(); }, 400);
                }, 6000);
            });
        }
    });
    /* Allow manual toast dismissal */
    document.body.addEventListener('click', function(evt) {
        if (evt.target.classList.contains('toast-close')) {
            var toast = evt.target.closest('.toast');
            if (toast) {
                toast.classList.add('toast-fade-out');
                setTimeout(function() { toast.remove(); }, 400);
            }
        }
    });
    </script>
</body>
</html>
